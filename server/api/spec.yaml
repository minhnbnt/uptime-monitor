openapi: "3.0.3"
info:
  title: Uptime Monitor API
  description: API for monitoring server uptime
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

tags:
  - name: servers
    description: Create, list, update, and delete servers
  - name: servers-search
    description: Search servers by name
  - name: servers-stats
    description: Server uptime and statistics
  - name: endpoints
    description: Endpoint configuration and testing
  - name: import
    description: Import and export server data
paths:
  # ── Servers (CRUD) ───────────────────────
  /api/v1/servers:
    $ref: "./paths/servers.yaml#/servers"
  /api/v1/servers/{id}:
    $ref: "./paths/servers.yaml#/servers-id"

  # ── Search ───────────────────────────────
  /api/v1/servers/search:
    $ref: "./paths/servers.yaml#/servers-search"

  # ── Stats ────────────────────────────────
  /api/v1/servers/ontime:
    $ref: "./paths/servers.yaml#/servers-ontime"

  # ── Endpoints ────────────────────────────
  /api/v1/test-endpoint:
    $ref: "./paths/servers.yaml#/test-endpoint"
  /api/v1/servers/{id}/check_method:
    $ref: "./paths/servers.yaml#/check-method"

  # ── Import / Export ──────────────────────
  /api/v1/servers/export:
    $ref: "./paths/servers.yaml#/servers-export"
  /api/v1/servers/import:
    $ref: "./paths/servers.yaml#/import-servers"

components:
  schemas:
    MonitorStatus:
      $ref: "./schemas/common.yaml#/MonitorStatus"
    PaginationMeta:
      $ref: "./schemas/common.yaml#/PaginationMeta"
    ErrorResponse:
      $ref: "./schemas/common.yaml#/ErrorResponse"

    ServerObject:
      $ref: "./schemas/server.yaml#/ServerObject"
    CreateServerRequest:
      $ref: "./schemas/server.yaml#/CreateServerRequest"
    UpdateServerRequest:
      $ref: "./schemas/server.yaml#/UpdateServerRequest"
    ServerResponse:
      $ref: "./schemas/server.yaml#/ServerResponse"
    ServerListResponse:
      $ref: "./schemas/server.yaml#/ServerListResponse"

    CheckMethodType:
      $ref: "./schemas/endpoint.yaml#/CheckMethodType"
    Endpoint:
      $ref: "./schemas/endpoint.yaml#/Endpoint"
    SetCheckMethodRequest:
      $ref: "./schemas/endpoint.yaml#/SetCheckMethodRequest"
    TestEndpointRequest:
      $ref: "./schemas/endpoint.yaml#/TestEndpointRequest"
    TestEndpointResponse:
      $ref: "./schemas/endpoint.yaml#/TestEndpointResponse"

    OntimeStats:
      $ref: "./schemas/ontime.yaml#/OntimeStats"
    ServerWithOntime:
      $ref: "./schemas/ontime.yaml#/ServerWithOntime"
    ServerOntimeListResponse:
      $ref: "./schemas/ontime.yaml#/ServerOntimeListResponse"


