<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{.Title}} - API Docs</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui@5.32.6/dist/swagger-ui.css"
      integrity="sha256-yiOPfXws9EgMHnepw7nakVqyFulv/TVOaQdlYMZQxt4="
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div id="swagger-ui"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/swagger-ui@5.32.6/dist/swagger-ui-bundle.js"
      integrity="sha256-S1qbNaGt838A05wLriPNs3AH4pRiQO8DUTfMhbTVU0k="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/swagger-ui@5.32.6/dist/swagger-ui-standalone-preset.js"
      integrity="sha256-OPczQwD1JOHUVrHF9uxFODMWKDwldESqlFMUP9tDTHM="
      crossorigin="anonymous"
    ></script>

    <script>
      SwaggerUIBundle({
        url: {{.SpecURL}},
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset,
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl,
        ],
        layout: "StandaloneLayout",
      });
    </script>
  </body>
</html>
