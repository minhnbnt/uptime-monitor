[databases]
uptime_monitor = host=postgres port=5432 dbname=uptime_monitor
auth = host=postgres port=5432 dbname=auth
analytics = host=postgres port=5432 dbname=analytics

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
default_pool_size = 20
max_client_conn = 100
