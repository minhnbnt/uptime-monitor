db:
  host: pgbouncer
  port: 6432
  user: server
  password: server
  dbname: server

redis:
  addr: redis:6379
  password: ""
  db: 0

jwt:
  key: your-secret-key-here

token:
  access_ttl: 15m
  refresh_ttl: 168h
  access_issuer: uptime-monitor
  refresh_issuer: uptime-monitor-refresh

argon2:
  memory: 16384
  iterations: 2
  parallelism: 1
  salt_length: 16
  key_length: 32

temporal:
  host: temporal:7233
  task_queue: ping-task-queue
  workflow_name: ping-workflow
  digest_task_queue: digest-task-queue

log:
  level: info

scheduler:
  backend: redis

mail:
  smtp_host: mailpit
  smtp_port: 1025
  from_address: noreply@uptime.local
