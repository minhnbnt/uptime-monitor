services:
  traefik:
    image: ghcr.io/traefik/traefik:3.7

    command:
      - --entryPoints.web.address=:8080
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedByDefault=false

    ports:
      - 8080:8080

    volumes:
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:Z

    labels:
      traefik.enable: true
      traefik.http.middlewares.cors.headers.accessControlAllowOriginList: "*"
      traefik.http.middlewares.cors.headers.accessControlAllowMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      traefik.http.middlewares.cors.headers.accessControlAllowHeaders: "*"
      traefik.http.middlewares.cors.headers.accessControlMaxAge: 86400

  auth-service:
    build: ./auth-service
    ports:
      - 8081:8081

    command: --config=/config.yml

    volumes:
      - ./config/auth-service.yaml:/config.yml

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    labels:
      traefik.enable: true
      traefik.http.routers.auth.rule: PathPrefix(`/api/v1/auth`)
      traefik.http.routers.auth.service: auth-service
      traefik.http.routers.auth.middlewares: cors
      traefik.http.services.auth-service.loadbalancer.server.port: 8081

  server-service:
    build:
      context: .
      dockerfile: server-service/Dockerfile

    ports:
      - 8080

    command: ["--dev", "--config=/app/config.yml"]

    volumes:
      - ./config/server-service.yml:/app/config.yml

    depends_on:
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

    labels:
      traefik.enable: "true"
      traefik.http.routers.server.rule: PathPrefix(`/api/v1/servers`) || PathPrefix(`/api/v1/test-endpoint`)
      traefik.http.routers.server.priority: 10
      traefik.http.routers.server.service: server-service
      traefik.http.services.server-service.loadbalancer.server.port: 8080
      traefik.http.routers.server.middlewares: cors, forward-auth
      traefik.http.middlewares.forward-auth.forwardauth.address: http://auth-service:8081/auth/verify
      traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders: X-User-ID

  importer-service:
    build:
      context: .
      dockerfile: importer-service/Dockerfile

    ports:
      - 8086

    command: ["--dev", "--config=/app/config.yml"]

    volumes:
      - ./config/importer-service.yml:/app/config.yml

    depends_on:
      server-service:
        condition: service_started

    labels:
      traefik.enable: "true"
      traefik.http.routers.importer.rule: PathPrefix(`/api/v1/servers/import`) || PathPrefix(`/api/v1/servers/export`)
      traefik.http.routers.importer.priority: 30
      traefik.http.routers.importer.service: importer-service
      traefik.http.services.importer-service.loadbalancer.server.port: 8086
      traefik.http.routers.importer.middlewares: cors, forward-auth

  ping-service:
    build:
      context: .
      dockerfile: ping-service/Dockerfile

    command: ["--config=/config.yml"]

    volumes:
      - ./config/ping-service.yml:/config.yml

    depends_on:
      server-service:
        condition: service_started
      redis:
        condition: service_started

  ontime-service:
    build:
      context: .
      dockerfile: ontime-service/Dockerfile

    command: ["--config=/config.yml"]

    ports:
      - 8084

    volumes:
      - ./config/ontime-service.yml:/config.yml

    depends_on:
      server-service:
        condition: service_started
      redis:
        condition: service_started

    labels:
      traefik.enable: "true"
      traefik.http.routers.ontime.rule: PathPrefix(`/api/v1/servers/ontime`)
      traefik.http.routers.ontime.priority: 20
      traefik.http.routers.ontime.service: ontime-service
      traefik.http.services.ontime-service.loadbalancer.server.port: 8084
      traefik.http.routers.ontime.middlewares: cors, forward-auth

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile

    command: ["--config=/config.yml"]

    volumes:
      - ./config/notification-service.yml:/config.yml

    depends_on:
      temporal:
        condition: service_started
      pgbouncer:
        condition: service_started

    labels:
      traefik.enable: true
      traefik.http.routers.notification.rule: PathPrefix(`/api/v1/notifications`)
      traefik.http.routers.notification.service: notification-service
      traefik.http.routers.notification.middlewares: cors, forward-auth
      traefik.http.services.notification-service.loadbalancer.server.port: 8085

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0

    ports:
      - 6432:6432

    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/userlist.txt:/etc/pgbouncer/userlist.txt:ro

    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: ghcr.io/valkey-io/valkey:9-alpine
    ports:
      - 6379:6379

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

  postgres:
    image: paradedb/paradedb:pg18
    command: postgres -c wal_level=logical

    ports:
      - 5433:5432

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql/
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  debezium:
    image: quay.io/debezium/server:3.6.0.Final

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    volumes:
      - ./config/debezium.yml:/debezium/config/application.yaml:ro
      - debezium-data:/debezium/data

  temporal:
    image: temporalio/temporal:1.7.2

    ports:
      - 7233:7233
      - 8233:8233

    volumes:
      - temporal-data:/home/temporal

    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db

  pgadmin:
    image: dpage/pgadmin4:9

    environment:
      PGADMIN_DEFAULT_EMAIL: minhnbnt@example.com
      PGADMIN_DEFAULT_PASSWORD: 12345678
      PGADMIN_CONFIG_SERVER_MODE: False

    ports:
      - 8000:80

    depends_on:
      - postgres

    volumes:
      - pgadmin-data:/var/lib/pgadmin

  mailpit:
    image: ghcr.io/axllent/mailpit:v1.30.4

    ports:
      - 8025:8025

    volumes:
      - ./mailpit-data:/data

    environment:
      MP_DATABASE: /data/mailpit.db
      MAIL_FROM_ADDRESS: no-reply@test.local
      MAIL_FROM_NAME: My App

volumes:
  postgres-data:
  pgadmin-data:
  redis_data:
  temporal-data:
  debezium-data:
