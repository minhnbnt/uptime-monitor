services:
  app:
    build: .
    ports:
      - 8080:8080

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: alerts
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: alerts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alerts"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal:1.7.0
    container_name: temporal

    ports:
      - 7233:7233
      - 8233:8233

    volumes:
      - temporal-data:/home/temporal

    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db

volumes:
  temporal-data:
  postgres-data:
