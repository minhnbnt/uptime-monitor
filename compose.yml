services:
  server:
    build: .
    ports:
      - 8080:8080
    command: ["./app", "--worker=false"]

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow
      TEMPORAL_HOST: host.docker.internal:7233

    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["./app", "--server=false"]

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow
      TEMPORAL_HOST: host.docker.internal:7233

    depends_on:
      postgres:
        condition: service_healthy

  worker-1:
    build: .
    command: ["./app", "--server=false"]

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow
      TEMPORAL_HOST: host.docker.internal:7233

    depends_on:
      postgres:
        condition: service_healthy

  worker-2:
    build: .
    command: ["./app", "--server=false"]

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow
      TEMPORAL_HOST: host.docker.internal:7233

    depends_on:
      postgres:
        condition: service_healthy

  worker-3:
    build: .
    command: ["./app", "--server=false"]

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LOG_LEVEL: info
      APP_ENV: development
      TEMPORAL_TASK_QUEUE: ping-task-queue
      TEMPORAL_WORKFLOW_NAME: ping-workflow
      TEMPORAL_HOST: host.docker.internal:7233

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alerts"]
      interval: 5s
      timeout: 5s
      retries: 5

  # temporal:
