services:
  server:
    build: .
    ports:
      - 8080:8080

    command: ["--dev", "--config=/app/config.yml"]

    volumes:
      - ./config.yml:/app/config.yml

    depends_on:
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0

    ports:
      - "6432:6432"

    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"

    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: valkey/valkey:9-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: "redis-server --appendonly yes"

  postgres:
    image: paradedb/paradedb:pg18

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql/

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal:1.7.2

    ports:
      - 7233:7233
      - 8233:8233

    volumes:
      - temporal-data:/home/temporal

    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db

  pgadmin:
    image: dpage/pgadmin4:9

    environment:
      PGADMIN_DEFAULT_EMAIL: minhnbnt@example.com
      PGADMIN_DEFAULT_PASSWORD: 12345678
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - 8000:80

    depends_on:
      - postgres

    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres-data:
  pgadmin-data:
  redis_data:
  temporal-data:
