services:
  server:
    build: .
    ports:
      - 8080:8080

    command: ["--worker=false", "--scheduler-backend=redis", "--dev"]

    env_file:
      - ./.env

    depends_on:
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  worker:
    build: .
    command: ["--server=false", "--scheduler-backend=redis"]

    env_file:
      - ./.env

    depends_on:
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0

    ports:
      - "6432:6432"

    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: uptime_monitor
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"

    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: "redis-server --appendonly yes"

  postgres:
    image: paradedb/paradedb:pg17

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql/

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis_data:
