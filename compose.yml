services:
  server:
    build: .
    ports:
      - 8080:8080
    command: ["./app", "--worker=false"]

    env_file:
      ./.env

    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["./app", "--server=false"]

    env_file:
      ./.env

    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: "redis-server --appendonly yes"

  postgres:
    image: postgres:17-alpine

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal:latest

    ports:
      - 7233:7233
      - 8233:8233

    volumes:
      - temporal-data:/home/temporal

    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db

volumes:
  temporal-data:
  postgres-data:
  redis_data:
