name: CI

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - server-service
          - importer-service
          - ping-service
          - ontime-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          install-mode: goinstall
          working-directory: ${{ matrix.service }}
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - server-service
          - importer-service
          - ping-service
          - ontime-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Generate protobuf (common)
        run: cd common/proto && buf generate

      - name: Test
        run: |
          cd ${{ matrix.service }}
          go generate ./...
          go vet ./...
          go test ./... -race -coverprofile=coverage.out

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.out
          if-no-files-found: ignore
