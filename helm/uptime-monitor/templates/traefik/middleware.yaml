{{- if .Values.traefik.enabled }}
{{- $ns := include "uptime-monitor.namespace" . -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors
  namespace: {{ $ns }}
spec:
  headers:
    accessControlAllowOriginList:
{{- range .Values.cors.allowOrigins }}
      - {{ . | quote }}
{{- end }}
    accessControlAllowMethods:
{{- range .Values.cors.allowMethods }}
      - {{ . | quote }}
{{- end }}
    accessControlAllowHeaders:
{{- range .Values.cors.allowHeaders }}
      - {{ . | quote }}
{{- end }}
    accessControlMaxAge: {{ .Values.cors.maxAge }}
    accessControlAllowCredentials: {{ .Values.cors.allowCredentials }}
{{- end }}
