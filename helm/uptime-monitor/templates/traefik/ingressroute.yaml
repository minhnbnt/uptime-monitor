{{- if .Values.traefik.enabled }}
{{- $ns := include "uptime-monitor.namespace" . -}}
{{- $httpPort := .Values.traefik.httpPort -}}
{{- range $name, $app := .Values.apps }}
{{- range $i, $path := $app.ingress }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: {{ $name }}-{{ $i }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $name }}

spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`{{ . }}`)
      kind: Rule
      services:
        - name: {{ $name }}
          port: {{ $app.port }}
      middlewares:
        - name: cors
{{- if ne $name "auth-service" }}
        - name: forward-auth
{{- end }}
{{- end }}
{{- end }}
{{- end }}
