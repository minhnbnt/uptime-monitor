{{- $ns := include "uptime-monitor.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "uptime-monitor.labels" (dict "name" $name) | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: {{ $app.port }}
      targetPort: http
{{- if $app.grpcPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-grpc
  namespace: {{ $ns }}
  labels:
    {{- include "uptime-monitor.labels" (dict "name" (printf "%s-grpc" $name) ) | nindent 4 }}
spec:
  # Headless service for gRPC: stable per-pod DNS, no cluster IP load balancing.
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: grpc
      port: {{ $app.grpcPort }}
      targetPort: grpc
{{- end }}
{{- end }}
{{- end }}
