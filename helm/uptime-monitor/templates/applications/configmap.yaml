{{- $ns := include "uptime-monitor.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ $ns }}
  labels:
    {{- include "uptime-monitor.labels" (dict "name" $name) | nindent 4 }}
data:
  config.yml: |
    {{- include "uptime-monitor.config" (dict "config" $app.config "root" $) | nindent 4 }}
{{- end }}
{{- end }}
