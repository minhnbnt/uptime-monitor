RegisterRequest:
  type: object
  required:
    - email
    - username
    - password
    - name
  properties:
    email:
      type: string
      format: email
    username:
      type: string
      minLength: 3
      maxLength: 100
    password:
      type: string
      minLength: 8
    name:
      type: string
      minLength: 1
      maxLength: 255

LoginRequest:
  type: object
  required:
    - login
    - password
  properties:
    login:
      type: string
    password:
      type: string

UserProfile:
  type: object
  required:
    - id
    - email
    - username
    - name
  properties:
    id:
      type: integer
    email:
      type: string
    username:
      type: string
    name:
      type: string

AuthResponse:
  type: object
  required:
    - access_token
    - refresh_token
    - user
  properties:
    access_token:
      type: string
    refresh_token:
      type: string
    user:
      $ref: "#/UserProfile"

RefreshTokenRequest:
  type: object
  required:
    - refresh_token
  properties:
    refresh_token:
      type: string
