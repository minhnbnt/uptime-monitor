openapi: "3.0.3"
info:
  title: Uptime Monitor API
  description: API for monitoring server uptime
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /api/v1/servers:
    $ref: "./paths/servers.yaml#/servers"
  /api/v1/servers/ontime:
    $ref: "./paths/servers.yaml#/servers-ontime"
  /api/v1/servers/{id}:
    $ref: "./paths/servers.yaml#/servers-id"
  /api/v1/servers/{id}/check_method:
    $ref: "./paths/servers.yaml#/check-method"
  /api/v1/auth/register:
    $ref: "./paths/auth.yaml#/register"
  /api/v1/auth/login:
    $ref: "./paths/auth.yaml#/login"
  /api/v1/auth/refresh:
    $ref: "./paths/auth.yaml#/refresh"
  /api/v1/auth/logout:
    $ref: "./paths/auth.yaml#/logout"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ServerStatus:
      $ref: "./schemas/common.yaml#/ServerStatus"
    PaginationMeta:
      $ref: "./schemas/common.yaml#/PaginationMeta"
    ErrorResponse:
      $ref: "./schemas/common.yaml#/ErrorResponse"

    ServerObject:
      $ref: "./schemas/server.yaml#/ServerObject"
    CreateServerRequest:
      $ref: "./schemas/server.yaml#/CreateServerRequest"
    UpdateServerRequest:
      $ref: "./schemas/server.yaml#/UpdateServerRequest"
    ServerResponse:
      $ref: "./schemas/server.yaml#/ServerResponse"
    ServerListResponse:
      $ref: "./schemas/server.yaml#/ServerListResponse"

    CheckMethodType:
      $ref: "./schemas/endpoint.yaml#/CheckMethodType"
    Endpoint:
      $ref: "./schemas/endpoint.yaml#/Endpoint"
    SetCheckMethodRequest:
      $ref: "./schemas/endpoint.yaml#/SetCheckMethodRequest"

    OntimeStats:
      $ref: "./schemas/ontime.yaml#/OntimeStats"
    ServerWithOntime:
      $ref: "./schemas/ontime.yaml#/ServerWithOntime"
    ServerOntimeListResponse:
      $ref: "./schemas/ontime.yaml#/ServerOntimeListResponse"

    RegisterRequest:
      $ref: "./schemas/auth.yaml#/RegisterRequest"
    LoginRequest:
      $ref: "./schemas/auth.yaml#/LoginRequest"
    UserProfile:
      $ref: "./schemas/auth.yaml#/UserProfile"
    AuthResponse:
      $ref: "./schemas/auth.yaml#/AuthResponse"
    RefreshTokenRequest:
      $ref: "./schemas/auth.yaml#/RefreshTokenRequest"
