openapi: "3.0.3"
info:
  title: Uptime Monitor API
  description: API for monitoring server uptime
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /api/v1/servers:
    post:
      summary: Create a new server
      operationId: CreateServer
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List servers
      operationId: ListServers
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ServerStatus"
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/servers/ontime:
    get:
      summary: List servers with ontime stats for the last 30 days
      operationId: ListServersOntime
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: List of servers with ontime stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerOntimeListResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/servers/{id}:
    get:
      summary: Get server by ID
      operationId: GetServer
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update server
      operationId: UpdateServer
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRequest"
      responses:
        "200":
          description: Server updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete server
      operationId: DeleteServer
      x-ogen-operation-group: Servers
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Server deleted successfully
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/servers/{id}/check_method:
    put:
      summary: Set check method for a server
      operationId: SetCheckMethod
      x-ogen-operation-group: Endpoint
      tags:
        - servers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCheckMethodRequest"
      responses:
        "200":
          description: Check method updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: Register
      x-ogen-operation-group: Auth
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/login:
    post:
      summary: Login with email or username
      operationId: Login
      x-ogen-operation-group: Auth
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: LoginRefresh
      x-ogen-operation-group: Auth
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout:
    post:
      summary: Logout and revoke refresh token
      operationId: Logout
      x-ogen-operation-group: Auth
      tags:
        - auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Logged out successfully
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ServerStatus:
      type: string
      enum:
        - active
        - paused

    ServerObject:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          $ref: "#/components/schemas/ServerStatus"
        endpoint:
          $ref: "#/components/schemas/Endpoint"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServerRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    UpdateServerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ServerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ServerObject"

    ServerListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServerObject"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CheckMethodType:
      type: string
      enum:
        - push
        - pull

    Endpoint:
      type: object
      required:
        - url
        - interval
        - timeout
        - method
        - expected_code
      properties:
        url:
          type: string
          format: uri
        status:
          $ref: "#/components/schemas/ServerStatus"
        interval:
          type: integer
          description: Interval in seconds (default 30)
        timeout:
          type: integer
          description: Timeout in seconds (default 10)
        method:
          type: string
          description: HTTP method (default GET)
        expected_code:
          type: integer
          description: Expected HTTP status code (default 200)

    SetCheckMethodRequest:
      type: object
      required:
        - method
        - endpoint
      properties:
        method:
          $ref: "#/components/schemas/CheckMethodType"
        endpoint:
          $ref: "#/components/schemas/Endpoint"

    OntimeStats:
      type: object
      required:
        - date
        - stats
      properties:
        date:
          type: string
          format: date
        stats:
          type: number
          format: double

    ServerWithOntime:
      type: object
      required:
        - server
        - ontime_stats
      properties:
        server:
          $ref: "#/components/schemas/ServerObject"
        ontime_stats:
          type: array
          items:
            $ref: "#/components/schemas/OntimeStats"

    ServerOntimeListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServerWithOntime"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    RegisterRequest:
      type: object
      required:
        - email
        - username
        - password
        - name
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
          maxLength: 255

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string

    UserProfile:
      type: object
      required:
        - id
        - email
        - username
        - name
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string

    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
