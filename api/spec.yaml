openapi: "3.0.3"
info:
  title: Uptime Monitor API
  description: API for monitoring server uptime
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /api/v1/servers:
    post:
      summary: Create a new server
      operationId: CreateServer
      tags:
        - servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List servers
      operationId: ListServers
      tags:
        - servers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ServerStatus"
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"

  /api/v1/servers/{id}:
    get:
      summary: Get server by ID
      operationId: GetServer
      tags:
        - servers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update server
      operationId: UpdateServer
      tags:
        - servers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRequest"
      responses:
        "200":
          description: Server updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete server
      operationId: DeleteServer
      tags:
        - servers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Server deleted successfully
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/servers/{id}/check_method:
    put:
      summary: Set check method for a server
      operationId: SetCheckMethod
      tags:
        - servers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCheckMethodRequest"
      responses:
        "200":
          description: Check method updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ServerStatus:
      type: string
      enum:
        - active
        - paused

    Server:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          $ref: "#/components/schemas/ServerStatus"
        endpoint:
          $ref: "#/components/schemas/Endpoint"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServerRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    UpdateServerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ServerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Server"

    ServerListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Server"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CheckMethodType:
      type: string
      enum:
        - push
        - pull

    Endpoint:
      type: object
      properties:
        url:
          type: string
          format: uri
        status:
          $ref: "#/components/schemas/ServerStatus"
        interval:
          type: integer
          description: Interval in seconds (default 30)
        timeout:
          type: integer
          description: Timeout in seconds (default 10)
        method:
          type: string
          description: HTTP method (default GET)
        expected_code:
          type: integer
          description: Expected HTTP status code (default 200)

    SetCheckMethodRequest:
      type: object
      required:
        - method
      properties:
        method:
          $ref: "#/components/schemas/CheckMethodType"
        endpoint:
          $ref: "#/components/schemas/Endpoint"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
