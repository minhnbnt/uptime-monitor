openapi: "3.0.3"
info:
  title: Uptime Monitor API
  description: API for monitoring server uptime
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /api/v1/servers:
    $ref: './paths/servers.yaml'
  /api/v1/servers/ontime:
    $ref: './paths/servers-ontime.yaml'
  /api/v1/servers/{id}:
    $ref: './paths/server-id.yaml'
  /api/v1/servers/{id}/check_method:
    $ref: './paths/check-method.yaml'
  /api/v1/auth/register:
    $ref: './paths/auth-register.yaml'
  /api/v1/auth/login:
    $ref: './paths/auth-login.yaml'
  /api/v1/auth/refresh:
    $ref: './paths/auth-refresh.yaml'

components:
  schemas:
    ServerStatus:
      type: string
      enum:
        - active
        - paused

    Server:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          $ref: "#/components/schemas/ServerStatus"
        endpoint:
          $ref: "#/components/schemas/Endpoint"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServerRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    UpdateServerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ServerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Server"

    ServerListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Server"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CheckMethodType:
      type: string
      enum:
        - push
        - pull

    Endpoint:
      type: object
      required:
        - url
        - interval
        - timeout
        - method
        - expected_code
      properties:
        url:
          type: string
          format: uri
        status:
          $ref: "#/components/schemas/ServerStatus"
        interval:
          type: integer
          description: Interval in seconds (default 30)
        timeout:
          type: integer
          description: Timeout in seconds (default 10)
        method:
          type: string
          description: HTTP method (default GET)
        expected_code:
          type: integer
          description: Expected HTTP status code (default 200)

    SetCheckMethodRequest:
      type: object
      required:
        - method
        - endpoint
      properties:
        method:
          $ref: "#/components/schemas/CheckMethodType"
        endpoint:
          $ref: "#/components/schemas/Endpoint"

    OntimeStats:
      type: object
      required:
        - date
        - stats
      properties:
        date:
          type: string
          format: date
        stats:
          type: number
          format: double

    ServerWithOntime:
      type: object
      required:
        - server
        - ontime_stats
      properties:
        server:
          $ref: "#/components/schemas/Server"
        ontime_stats:
          type: array
          items:
            $ref: "#/components/schemas/OntimeStats"

    ServerOntimeListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServerWithOntime"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    RegisterRequest:
      type: object
      required:
        - email
        - username
        - password
        - name
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
          maxLength: 255

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string

    UserProfile:
      type: object
      required:
        - id
        - email
        - username
        - name
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string

    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
