CheckMethodType:
  type: string
  enum:
    - push
    - pull

Endpoint:
  type: object
  required:
    - url
    - interval
    - timeout
    - method
    - expected_code
  properties:
    url:
      type: string
      format: uri
    status:
      $ref: "./common.yaml#/ServerStatus"
    interval:
      type: integer
      description: Interval in seconds (default 30)
    timeout:
      type: integer
      description: Timeout in seconds (default 10)
    method:
      type: string
      description: HTTP method (default GET)
    expected_code:
      type: integer
      description: Expected HTTP status code (default 200)

SetCheckMethodRequest:
  type: object
  required:
    - method
    - endpoint
  properties:
    method:
      $ref: "#/CheckMethodType"
    endpoint:
      $ref: "#/Endpoint"
