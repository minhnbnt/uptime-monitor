OntimeStats:
  type: object
  required:
    - date
    - stats
  properties:
    date:
      type: string
      format: date-time
    stats:
      type: number
      format: double

ServerOntime:
  type: object
  properties:
    server_id:
      type: integer
    ontime_stats:
      type: array
      items:
        $ref: "#/OntimeStats"

ServerOntimeListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: "#/ServerOntime"
