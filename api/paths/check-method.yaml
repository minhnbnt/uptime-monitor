put:
  summary: Set check method for a server
  operationId: SetCheckMethod
  tags:
    - servers
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/SetCheckMethodRequest"
  responses:
    "200":
      description: Check method updated successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServerResponse"
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
