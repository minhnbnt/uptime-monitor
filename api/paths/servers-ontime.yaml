get:
  summary: List servers with ontime stats for the last 30 days
  operationId: ListServersOntime
  tags:
    - servers
  security:
    - BearerAuth: []
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    - name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 30
  responses:
    "200":
      description: List of servers with ontime stats
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServerOntimeListResponse"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
