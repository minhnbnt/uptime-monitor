post:
  summary: Logout and revoke refresh token
  operationId: Logout
  tags:
    - auth
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - refresh_token
          properties:
            refresh_token:
              type: string
  responses:
    "204":
      description: Logged out successfully
    "401":
      description: Invalid refresh token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
