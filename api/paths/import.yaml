servers-export:
  get:
    summary: Export servers to Excel file
    operationId: ExportServers
    x-ogen-operation-group: Import
    tags:
      - import
    parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: from
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: to
        in: query
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 10000
      - name: sort_by
        in: query
        schema:
          type: string
          enum: [name, created_at]
          default: name
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: asc
    responses:
      "200":
        description: Excel file with exported servers
        headers:
          Content-Disposition:
            schema:
              type: string
              default: 'attachment; filename="servers.xlsx"'
        content:
          application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
            schema:
              type: string
              format: binary
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

import-servers:
  post:
    summary: Import servers from Excel file
    operationId: ImportServers
    x-ogen-operation-group: Import
    tags:
      - import
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
    responses:
      "200":
        description: Import result
        content:
          application/json:
            schema:
              $ref: "../schemas/import.yaml#/ImportServersResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
  get:
    summary: Download Excel import template
    operationId: DownloadImportTemplate
    x-ogen-operation-group: Import
    tags:
      - import
    responses:
      "200":
        description: Excel template file
        content:
          application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
            schema:
              type: string
              format: binary
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
