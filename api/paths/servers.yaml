servers:
  post:
    summary: Create a new server
    operationId: CreateServer
    x-ogen-operation-group: Servers
    tags:
      - servers
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/server.yaml#/CreateServerRequest"
    responses:
      "201":
        description: Server created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
  get:
    summary: List servers
    operationId: ListServers
    x-ogen-operation-group: Servers
    tags:
      - servers
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
    responses:
      "200":
        description: List of servers
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerListResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

servers-ontime:
  get:
    summary: List servers with ontime stats for the last 30 days
    operationId: ListServersOntime
    x-ogen-operation-group: Servers
    tags:
      - servers-stats
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 30
    responses:
      "200":
        description: List of servers with ontime stats
        content:
          application/json:
            schema:
              $ref: "../schemas/ontime.yaml#/ServerOntimeListResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

servers-id:
  get:
    summary: Get server by ID
    operationId: GetServer
    x-ogen-operation-group: Servers
    tags:
      - servers
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      "200":
        description: Server details
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
  put:
    summary: Update server
    operationId: UpdateServer
    x-ogen-operation-group: Servers
    tags:
      - servers
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/server.yaml#/UpdateServerRequest"
    responses:
      "200":
        description: Server updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
  delete:
    summary: Delete server
    operationId: DeleteServer
    x-ogen-operation-group: Servers
    tags:
      - servers
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      "204":
        description: Server deleted successfully
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

test-endpoint:
  post:
    summary: Test connection to an endpoint
    operationId: TestEndpoint
    x-ogen-operation-group: Endpoint
    tags:
      - endpoints
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/endpoint.yaml#/TestEndpointRequest"
    responses:
      "200":
        description: Test result
        content:
          application/json:
            schema:
              $ref: "../schemas/endpoint.yaml#/TestEndpointResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

check-method:
  put:
    summary: Set check method for a server
    operationId: SetCheckMethod
    x-ogen-operation-group: Endpoint
    tags:
      - endpoints
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/endpoint.yaml#/SetCheckMethodRequest"
    responses:
      "200":
        description: Check method updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

servers-search:
  get:
    summary: Search servers by name
    operationId: SearchServers
    x-ogen-operation-group: Servers
    tags:
      - servers-search
    parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        schema:
          type: string
          enum: [name, created_at, score]
          default: score
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      "200":
        description: Search results
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerListResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
