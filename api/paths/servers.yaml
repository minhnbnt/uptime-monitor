post:
  summary: Create a new server
  operationId: CreateServer
  tags:
    - servers
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/CreateServerRequest"
  responses:
    "201":
      description: Server created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServerResponse"
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

get:
  summary: List servers
  operationId: ListServers
  tags:
    - servers
  security:
    - BearerAuth: []
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    - name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: status
      in: query
      schema:
        $ref: "#/components/schemas/ServerStatus"
  responses:
    "200":
      description: List of servers
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServerListResponse"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
