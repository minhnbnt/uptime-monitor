    operationId: TestEndpoint
    x-ogen-operation-group: Endpoint
    tags:
      - servers
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/endpoint.yaml#/TestEndpointRequest"
    responses:
      "200":
        description: Test result
        content:
          application/json:
            schema:
              $ref: "../schemas/endpoint.yaml#/TestEndpointResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

check-method:
  put:
    summary: Set check method for a server
    operationId: SetCheckMethod
    x-ogen-operation-group: Endpoint
    tags:
      - servers
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/endpoint.yaml#/SetCheckMethodRequest"
    responses:
      "200":
        description: Check method updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/server.yaml#/ServerResponse"
      default:
        description: Error response
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
